<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Johome AI Buying Agent · 交互原型</title>
<meta name="description" content="Johome Community Buying AI 选区助手手机端可交互原型"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f3ee;
  --color-background-tertiary:#faf9f5;
  --color-text-primary:#1d1d1a;
  --color-text-secondary:#6b6a63;
  --color-text-tertiary:#9b998f;
  --color-border-tertiary:rgba(0,0,0,0.10);
  --color-border-secondary:rgba(0,0,0,0.18);
  --color-background-info:#e6f1fb;--color-text-info:#0c447c;
  --color-background-warning:#faeeda;--color-text-warning:#854f0b;
  --color-background-success:#e1f5ee;--color-text-success:#0f6e56;
  --border-radius-md:8px;--border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#eceae3;font-family:var(--font-sans);color:var(--color-text-primary);padding:22px 12px 40px;-webkit-font-smoothing:antialiased}
.page-title{max-width:330px;margin:0 auto 14px;text-align:center}
.page-title h1{font-size:18px;font-weight:500;margin:0 0 4px}
.page-title p{font-size:12.5px;color:var(--color-text-secondary);margin:0;line-height:1.5}
#jhp{max-width:330px;margin:0 auto}
.jhp-cap{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--color-text-secondary);margin:0 0 12px 2px;line-height:1.45}
.jhp-cap i{color:#0F6E56;font-size:16px;margin-top:2px}
.ph{width:300px;margin:0 auto;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:30px;padding:7px;box-shadow:0 8px 30px rgba(0,0,0,0.10)}
.scr{height:632px;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;background:var(--color-background-tertiary)}
.sb{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 4px;font-size:11px;color:var(--color-text-primary);background:var(--color-background-primary);flex:none}
.sb .ri{display:flex;gap:5px;font-size:13px}
.stage{flex:1;min-height:0;position:relative}
.view-chat{display:flex;flex-direction:column;height:100%}
.view-detail{display:none;flex-direction:column;height:100%}
.hd{display:flex;align-items:center;gap:9px;padding:7px 12px 9px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex:none}
.bk{font-size:20px;color:var(--color-text-secondary);cursor:pointer}
.hav{width:30px;height:30px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;flex:none}
.hav i{font-size:16px;color:#fff}
.pref{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#E1F5EE;border-bottom:0.5px solid #9FE1CB;flex:none;cursor:pointer}
.pc{font-size:11.5px;color:#0F6E56;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.editbtn{display:flex;align-items:center;gap:2px;font-size:11.5px;color:#0F6E56;white-space:nowrap}
.chat,.dscroll{flex:1;min-height:0;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:11px}
.dscroll{gap:11px;background:var(--color-background-tertiary)}
.row{display:flex;gap:7px;align-items:flex-start}
.row.me{justify-content:flex-end}
.av{width:26px;height:26px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;flex:none}
.av i{font-size:14px;color:#fff}
.bub{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;border-top-left-radius:4px;padding:9px 11px;font-size:12.5px;line-height:1.55;max-width:215px}
.ubub{background:#0F6E56;color:#fff;border-radius:14px;border-top-right-radius:4px;padding:9px 11px;font-size:12.5px;line-height:1.55;max-width:210px}
.qr{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;padding-left:33px}
.q{padding:6px 11px;border-radius:999px;font-size:12px;border:0.5px solid #1D9E75;color:#0F6E56;background:transparent;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.q:hover{background:#E1F5EE}
.q.on{background:#0F6E56;color:#fff;border-color:#0F6E56}
.inbar{display:flex;align-items:center;gap:8px;padding:9px 11px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);flex:none}
.inp{flex:1;height:36px;border-radius:999px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);padding:0 14px;font-size:12.5px;color:var(--color-text-primary);outline:none}
.send{width:34px;height:34px;border-radius:50%;background:#0F6E56;border:none;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;padding:0}
.send i{color:#fff;font-size:18px}
.cc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px}
.cc[data-tap],.cc[data-more]{cursor:pointer}
.cc[data-tap]:hover,.cc[data-more]:hover{border-color:#1D9E75}
.score{width:34px;height:34px;border-radius:50%;background:#E1F5EE;border:1.5px solid #1D9E75;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none}
.score b{font-size:14px;font-weight:500;color:#0F6E56;line-height:1}
.score s{font-size:8px;color:#0F6E56;text-decoration:none}
.met{background:var(--color-background-secondary);border-radius:6px;padding:6px 8px}
.met .v{font-size:13px;font-weight:500}
.met .l{font-size:10.5px;color:var(--color-text-secondary)}
.thumb{width:54px;height:48px;border-radius:8px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;flex:none;color:var(--color-text-tertiary)}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10.5px}
.muted{color:var(--color-text-secondary)}
.sec{font-size:12.5px;font-weight:500;margin:0 0 7px}
.field{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:10px;font-size:12.5px;color:var(--color-text-primary)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:500;background:#0F6E56;color:#fff;border:none;cursor:pointer}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--color-text-tertiary);margin:0 1px;animation:jblink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes jblink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.rst{display:block;margin:14px auto 0;font-size:12px;color:var(--color-text-secondary);background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:999px;padding:6px 14px;cursor:pointer}
</style>
</head>
<body>
<div class="page-title"><h1>⛳ Johome AI Buying Agent · 交互原型</h1><p>手机端 AI agent 选区助手 · 点选项或直接打字即可体验</p></div>
<div id="jhp">
<div class="jhp-cap"><i class="ti ti-hand-finger"></i><span>点选项或直接打字（说得越细，AI 自动记录的偏好越多，比如「130万、Downtown上班、4岁孩子、想要安静近天车的3房townhouse」）。顶部「我的档案」查看记录到的偏好。</span></div>
<div class="ph"><div class="scr">
  <div class="sb"><span>9:41</span><span class="ri"><i class="ti ti-signal-4g"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>
  <div class="stage">
    <div class="view-chat">
      <div class="hd"><i class="ti ti-arrow-left bk"></i><div class="hav"><i class="ti ti-sparkles"></i></div><div style="flex:1"><div style="font-size:13.5px;font-weight:500">Johome AI Buying Agent</div><div style="font-size:10.5px;color:#1D9E75">您的智能找房/选区/地产投资AI助手</div></div><i class="ti ti-dots muted" style="font-size:20px"></i></div>
      <div class="pref" id="profStrip"><i class="ti ti-adjustments" style="color:#0F6E56;font-size:15px"></i><span class="pc">AI 会边聊边记录你的偏好</span><span class="editbtn">我的档案<i class="ti ti-chevron-right" style="font-size:14px"></i></span></div>
      <div class="chat">
        <div class="row"><div class="av"><i class="ti ti-sparkles"></i></div><div class="bub">你好，我是 Johome AI Buying Agent。直接说说你的情况，或先选一项 —— 你买这套房主要是？</div></div>
        <div class="qr live"><button class="q" data-v="自住">自住</button><button class="q" data-v="投资">投资</button><button class="q" data-v="两者都考虑">两者都考虑</button></div>
      </div>
      <div class="inbar"><input class="inp" placeholder="用自然语言告诉我你的需求…"/><i class="ti ti-microphone muted" style="font-size:19px"></i><button class="send"><i class="ti ti-arrow-up"></i></button></div>
    </div>
    <div class="view-detail"></div>
  </div>
</div></div>
<button class="rst"><i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px"></i> 重新开始演示</button>
</div>
<script>
(function(){
  var root=document.getElementById('jhp');
  var list=root.querySelector('.chat');
  var pc=root.querySelector('.pc');
  var chatView=root.querySelector('.view-chat');
  var detail=root.querySelector('.view-detail');
  var inp=root.querySelector('.inp');
  var sendBtn=root.querySelector('.send');
  var initHTML=list.innerHTML;
  var profile={purpose:'',anchor:'',area:'',district:'',dest:'',mode:'',time:'',budget:'',htype:'',beds:'',baths:'',sqftMin:'',age:'',parking:'',nearTransit:'',features:'',pet:'',family:'',kids:'',firstTime:'',vibe:'',amenities:'',safety:'',lifeSvc:'',invGoal:'',yield:'',rentability:'',hold:'',timeline:'',preApproved:'',downPay:'',school:''};
  var answer=null,lastResult=null,stack=[],profileEdit=false;
  var BUD=[{label:'80–120万'},{label:'120–160万'},{label:'>160万'}];
  var TYP=[{label:'Townhouse'},{label:'Condo'},{label:'独立屋'}];
  var TIM=[{label:'30分钟'},{label:'45分钟'},{label:'60分钟'}];
  var INV=[{label:'现金流'},{label:'增值'},{label:'都要'}];
  var MODE=[{label:'开车'},{label:'公交'},{label:'步行'}];
  var BEDS=[{label:'1室'},{label:'2室'},{label:'3室'},{label:'4室+'}];
  var BATHS=[{label:'1浴'},{label:'2浴'},{label:'3浴+'}];
  var AGE=[{label:'全新'},{label:'楼花'},{label:'二手'},{label:'不限'}];
  var PARK=[{label:'1车位'},{label:'2车位+'}];
  var KIDS=[{label:'学龄前'},{label:'小学'},{label:'中学'},{label:'暂无'}];
  var VIBE=[{label:'热闹'},{label:'安静'}];
  var TLINE=[{label:'尽快'},{label:'3个月内'},{label:'半年内'},{label:'一年内'},{label:'再看看'}];
  var PREAP=[{label:'已预批'},{label:'未预批'}];
  var YN=[{label:'是'},{label:'否'}];
  var FIELDS=[
    {k:'purpose',label:'购房目的',group:'基本'},
    {k:'anchor',label:'找房方式',group:'基本'},
    {k:'area',label:'目标城市/区域',group:'基本'},
    {k:'district',label:'目标商圈',group:'基本'},
    {k:'school',label:'目标学校',group:'基本'},
    {k:'dest',label:'通勤目的地',group:'基本'},
    {k:'mode',label:'通勤方式',group:'基本',edit:MODE},
    {k:'time',label:'可接受通勤',group:'基本',edit:TIM},
    {k:'budget',label:'预算',group:'基本',edit:BUD},
    {k:'htype',label:'房型',group:'基本',edit:TYP},
    {k:'beds',label:'卧室数',group:'房源条件',edit:BEDS},
    {k:'baths',label:'浴室数',group:'房源条件',edit:BATHS},
    {k:'sqftMin',label:'最小面积',group:'房源条件'},
    {k:'age',label:'房龄偏好',group:'房源条件',edit:AGE},
    {k:'parking',label:'车位',group:'房源条件',edit:PARK},
    {k:'nearTransit',label:'近轨道交通',group:'房源条件'},
    {k:'features',label:'必备配置',group:'房源条件'},
    {k:'pet',label:'宠物友好',group:'房源条件'},
    {k:'family',label:'家庭结构',group:'家庭与学校'},
    {k:'kids',label:'孩子学段',group:'家庭与学校',edit:KIDS},
    {k:'firstTime',label:'首次购房',group:'家庭与学校',edit:YN},
    {k:'vibe',label:'氛围偏好',group:'生活偏好',edit:VIBE},
    {k:'amenities',label:'周边设施',group:'生活偏好'},
    {k:'safety',label:'看重安全',group:'生活偏好'},
    {k:'lifeSvc',label:'生活服务',group:'生活偏好'},
    {k:'invGoal',label:'投资目标',group:'投资',edit:INV},
    {k:'yield',label:'目标回报',group:'投资'},
    {k:'rentability',label:'出租优先',group:'投资'},
    {k:'hold',label:'持有年限',group:'投资'},
    {k:'timeline',label:'购房时间线',group:'时间线与资金',edit:TLINE},
    {k:'preApproved',label:'贷款预批',group:'时间线与资金',edit:PREAP},
    {k:'downPay',label:'首付比例',group:'时间线与资金'}
  ];

  function esc(s){return (''+s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function scroll(){list.scrollTop=list.scrollHeight;}
  function addAI(html){var r=document.createElement('div');r.className='row';r.innerHTML='<div class="av"><i class="ti ti-sparkles"></i></div><div class="bub">'+html+'</div>';list.appendChild(r);scroll();}
  function addUser(t){var r=document.createElement('div');r.className='row me';r.innerHTML='<div class="ubub">'+esc(t)+'</div>';list.appendChild(r);scroll();}
  function clearLive(){var n=list.querySelectorAll('.qr.live');for(var i=0;i<n.length;i++)n[i].remove();}
  function quick(opts){var w=document.createElement('div');w.className='qr live';opts.forEach(function(o){var b=document.createElement('button');b.className='q';b.innerHTML=(o.icon?'<i class="ti '+o.icon+'"></i>':'')+o.label;b.onclick=function(){pick(o.label);};w.appendChild(b);});list.appendChild(w);scroll();}
  function quickAct(opts){var w=document.createElement('div');w.className='qr';opts.forEach(function(o){var b=document.createElement('button');b.className='q';b.innerHTML=(o.icon?'<i class="ti '+o.icon+'"></i>':'')+o.label;b.onclick=o.fn;w.appendChild(b);});list.appendChild(w);scroll();}
  function pick(v){if(answer===null)return;addUser(v);clearLive();var f=answer;answer=null;f(v,false);}
  function typing(cb){var r=document.createElement('div');r.className='row';r.innerHTML='<div class="av"><i class="ti ti-sparkles"></i></div><div class="bub"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';list.appendChild(r);scroll();setTimeout(function(){r.remove();cb();},600);}
  function ask(html,opts,resolver){typing(function(){addAI(html);if(opts)quick(opts);answer=resolver;});}
  function askInput(html,examples,resolver){typing(function(){addAI(html);if(examples)quick(examples);answer=resolver;inp.focus();});}
  function addBlock(html,tapFn){var r=document.createElement('div');r.className='row';r.innerHTML='<div class="av"><i class="ti ti-sparkles"></i></div>';var d=document.createElement('div');d.style.flex='1';d.style.minWidth='0';d.innerHTML=html;r.appendChild(d);list.appendChild(r);if(tapFn){var n=d.querySelectorAll('[data-tap]');for(var i=0;i<n.length;i++){(function(el){el.addEventListener('click',function(){tapFn(el.getAttribute('data-tap'));});})(n[i]);}}scroll();}
  function pref(){var cnt=0;for(var i=0;i<FIELDS.length;i++){if(profile[FIELDS[i].k])cnt++;}pc.textContent=cnt?('已记录 '+cnt+' 项偏好'):'AI 会边聊边记录你的偏好';}
  function askBudget(next){ask('预算大概多少？',BUD,function(v){profile.budget=v;pref();next();});}
  function askType(next){ask('想要什么房型？',TYP,function(v){profile.htype=v;pref();next();});}

  function ncard(name,sub,sc,line,m1,m1l,m2,m2l){return '<div class="cc" data-tap="'+name+'" style="width:192px;flex:none"><div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:7px"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">'+name+'</div><div class="muted" style="font-size:11px">'+sub+'</div></div><div class="score"><b>'+sc+'</b><s>匹配</s></div></div><div style="font-size:11.5px;color:var(--color-text-secondary);line-height:1.45;margin-bottom:8px">'+line+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px"><div class="met"><div class="v">'+m1+'</div><div class="l">'+m1l+'</div></div><div class="met"><div class="v">'+m2+'</div><div class="l">'+m2l+'</div></div></div><div style="font-size:12px;color:#0F6E56;font-weight:500">查看详情 <i class="ti ti-chevron-right"></i></div></div>';}
  function citycard(name,sub,m1,m1l,m2,m2l){return '<div class="cc" data-tap="'+name+'" style="width:192px;flex:none"><div style="display:flex;align-items:center;gap:7px;margin-bottom:8px"><i class="ti ti-building-skyscraper" style="font-size:18px;color:#0F6E56"></i><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">'+name+'</div><div class="muted" style="font-size:11px">'+sub+'</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px"><div class="met"><div class="v">'+m1+'</div><div class="l">'+m1l+'</div></div><div class="met"><div class="v" style="color:#0F6E56">'+m2+'</div><div class="l">'+m2l+'</div></div></div><div style="font-size:12px;color:#0F6E56;font-weight:500">看该市社区 <i class="ti ti-chevron-right"></i></div></div>';}
  function districtcard(name,landmark,line,m1,m1l,m2,m2l){return '<div class="cc" data-tap="'+name+'" style="width:198px;flex:none"><div style="display:flex;align-items:center;gap:7px;margin-bottom:7px"><i class="ti ti-building-store" style="font-size:18px;color:#0F6E56"></i><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">'+name+'</div><div class="muted" style="font-size:11px">'+landmark+'</div></div></div><div style="font-size:11.5px;color:var(--color-text-secondary);line-height:1.45;margin-bottom:8px">'+line+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px"><div class="met"><div class="v">'+m1+'</div><div class="l">'+m1l+'</div></div><div class="met"><div class="v">'+m2+'</div><div class="l">'+m2l+'</div></div></div><div style="font-size:12px;color:#0F6E56;font-weight:500">查看详情 <i class="ti ti-chevron-right"></i></div></div>';}
  function schoolcard(name,sub,sc){return '<div class="cc" data-tap="'+name+'" style="width:192px;flex:none"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><i class="ti ti-school" style="font-size:18px;color:#0F6E56"></i><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+name+'</div><div class="muted" style="font-size:11px">'+sub+'</div></div></div><div class="met"><div class="v">'+sc+'</div><div class="l">Fraser 评分</div></div><div style="font-size:12px;color:#0F6E56;font-weight:500;margin-top:8px">查看详情 <i class="ti ti-chevron-right"></i></div></div>';}
  function lcard(price,spec,tg){return '<div class="cc" data-tap="'+price+'" style="display:flex;gap:9px;align-items:center;padding:9px;margin-bottom:8px"><div class="thumb"><i class="ti ti-photo" style="font-size:19px"></i></div><div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:500">'+price+'</div><div class="muted" style="font-size:11px">'+spec+'</div>'+(tg?'<span class="tag" style="background:var(--color-background-info);color:var(--color-text-info);margin-top:3px">'+tg+'</span>':'')+'</div><i class="ti ti-chevron-right muted"></i></div>';}
  function hlcard(price,spec){return '<div class="cc" data-tap="'+price+'" style="width:142px;flex:none;padding:0;overflow:hidden"><div style="height:82px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary)"><i class="ti ti-photo" style="font-size:22px"></i></div><div style="padding:8px 9px"><div style="font-size:13px;font-weight:500">'+price+'</div><div class="muted" style="font-size:10.5px;margin-top:2px">'+spec+'</div></div></div>';}

  function section(t,inner){return '<div><div class="sec">'+t+'</div>'+inner+'</div>';}

  function openListing(label,invest){var m=invest?'<div class="met"><div class="v">4.5%</div><div class="l">Cap Rate</div></div><div class="met"><div class="v">$2,650</div><div class="l">预估月租</div></div><div class="met"><div class="v">12天</div><div class="l">平均 DOM</div></div><div class="met"><div class="v" style="color:#0F6E56">+5.1%</div><div class="l">近一年涨幅</div></div>':'<div class="met"><div class="v">2018</div><div class="l">建成年份</div></div><div class="met"><div class="v">$3,980</div><div class="l">地税/年</div></div><div class="met"><div class="v">400m</div><div class="l">距天车站</div></div><div class="met"><div class="v">7.8</div><div class="l">学区评分</div></div>';var why=invest?'租售比 4.5%、近一年涨幅 5.1%、流动性好（DOM 12 天），符合你「'+(profile.invGoal||'回报')+'」的投资目标。':'符合你「'+(profile.budget||'预算')+' · '+(profile.htype||'房型')+'」的硬条件，距天车站近、在好学区内。';var cta=invest?'看回报测算':'预约看房';var spec=invest?'1+den · Condo · 适合出租':'3 床 2 浴 · Townhouse · Richmond';openPage(dhd(label)+'<div class="dscroll"><div style="height:148px;background:var(--color-background-secondary);border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none"><i class="ti ti-photo" style="font-size:30px;color:var(--color-text-tertiary)"></i></div><div><div style="font-size:20px;font-weight:500">'+label+'</div><div class="muted" style="font-size:12.5px">'+spec+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">'+m+'</div>'+fitcard(why).replace('为你而选','为什么推给你')+'</div><div class="inbar" style="gap:9px"><div class="field">'+cta+'</div><button class="btn" style="width:auto;padding:10px 16px">问 AI</button></div>');}
  function crow(l,a,b,hi){var s='color:#0F6E56;font-weight:500';return '<tr><td class="muted" style="padding:9px 2px;border-top:0.5px solid var(--color-border-tertiary)">'+l+'</td><td style="text-align:center;border-top:0.5px solid var(--color-border-tertiary);'+(hi==1?s:'')+'">'+a+'</td><td style="text-align:center;border-top:0.5px solid var(--color-border-tertiary);'+(hi==2?s:'')+'">'+b+'</td></tr>';}
  function openCompare(){openPage(dhd('社区对比')+'<div class="dscroll"><table style="width:100%;table-layout:fixed;border-collapse:collapse;font-size:12px"><tr><td style="width:34%"></td><td style="text-align:center;padding:6px 4px"><div style="font-weight:500">Brentwood</div><div style="color:#0F6E56;font-weight:500;font-size:13px">88</div></td><td style="text-align:center;padding:6px 4px"><div style="font-weight:500">Lougheed</div><div style="color:#0F6E56;font-weight:500;font-size:13px">85</div></td></tr>'+crow('预算覆盖率','64%','71%',2)+crow('目标房型','31 套','24 套',1)+crow('通勤时间','28 min','33 min',1)+crow('学校评分','7.8','7.5',1)+crow('市场热度','中','中',0)+crow('主要风险','高峰拥堵','配套稍弱',0)+'</table><div class="cc" style="background:#E1F5EE;border-color:#9FE1CB"><div style="display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;color:#0F6E56;margin-bottom:5px"><i class="ti ti-sparkles"></i>Agent 总结</div><div style="font-size:12px;line-height:1.55;color:#085041">通勤优先、要更多目标房源 → 选 Brentwood；想要更低单价、预算覆盖更高 → 选 Lougheed。</div></div></div><div class="inbar"><button class="btn">让 Johome 顾问帮我确认</button></div>');}

  function profilePage(){var GR=['基本','房源条件','家庭与学校','生活偏好','投资','时间线与资金'];var html='';for(var gi=0;gi<GR.length;gi++){var g=GR[gi],block='';for(var i=0;i<FIELDS.length;i++){var f=FIELDS[i];if(f.group!==g)continue;var val=profile[f.k]||'';if(profileEdit&&f.edit){var chips='';for(var j=0;j<f.edit.length;j++){var o=f.edit[j];chips+='<button class="q'+(o.label===val?' on':'')+'" data-field="'+f.k+'" data-val="'+o.label+'">'+o.label+'</button>';}block+='<div class="cc"><div style="font-size:11.5px;color:var(--color-text-secondary);margin-bottom:8px">'+f.label+'</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+chips+'</div></div>';}else{var disp=val?'<div style="font-size:13px;font-weight:500;flex:1">'+val+'</div>':'<div style="font-size:13px;color:var(--color-text-tertiary);flex:1">—</div>';block+='<div class="cc" style="display:flex;align-items:center;gap:10px"><div style="font-size:11.5px;color:var(--color-text-secondary);flex:none;width:84px">'+f.label+'</div>'+disp+'</div>';}}if(block)html+='<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;margin:6px 2px 1px">'+g+'</div>'+block;}
   var note=profileEdit?'点下面的选项即可修改 / 补充，改完点「保存并重新匹配」。':'完整字段都列在这里；没获取到的暂时留空（说得越细，AI 自动填得越多）。';
   var btn=profileEdit?'<button class="btn" id="profSave">保存并重新匹配</button>':'<button class="btn" id="profEdit"><i class="ti ti-pencil"></i>修改偏好</button>';
   return dhd2('我的购房偏好')+'<div class="dscroll"><div style="font-size:12px;color:var(--color-text-secondary);line-height:1.55">'+note+'</div>'+html+'</div><div class="inbar">'+btn+'</div>';}
  function openProfile(){profileEdit=false;openPage(profilePage());}
  function profileSave(){profileEdit=false;showChat();if(lastResult){addAI('已按你在档案里更新的偏好重新匹配：');lastResult();}}

  function extract(t){if(!t)return;var s=t;
    var dp=s.match(/首付\s*(\d{1,3})\s*(万|%|成)/);if(dp)profile.downPay=dp[1]+dp[2];
    var sb=s.replace(/首付\s*\d{1,3}\s*(万|%|成)/,'');var mm=sb.match(/(\d{2,4})\s*万/);if(mm){var n=parseInt(mm[1],10);if(n>=40&&n<=2000)profile.budget=n<120?'80–120万':(n<=160?'120–160万':'>160万');}
    if(/townhouse|镇屋|联排|town\s*house/i.test(s))profile.htype='Townhouse';else if(/独立屋|detached/i.test(s))profile.htype='独立屋';else if(/condo|公寓|apartment/i.test(s))profile.htype='Condo';
    var cn={'一':1,'两':2,'二':2,'三':3,'四':4,'五':5};var bd=s.match(/([1-6])\s*(室|房|卧|bed)/i);if(bd)profile.beds=bd[1]+'室';else{var bc=s.match(/([一两二三四五])\s*(室|房|卧)/);if(bc)profile.beds=cn[bc[1]]+'室';}
    var ba=s.match(/([1-4])\s*(浴|卫|bath)/i);if(ba)profile.baths=ba[1]+'浴';
    var sq=s.match(/(\d{3,4})\s*(尺|呎|sqft|平方尺)/i);if(sq)profile.sqftMin=sq[1]+' sqft 起';
    if(/天车|地铁|轨道|skytrain|近站|车站|transit/i.test(s))profile.nearTransit='近轨道交通';
    if(/楼花|pre-?sale|presale/i.test(s))profile.age='楼花';else if(/全新|新房|brand\s*new/i.test(s))profile.age='全新';else if(/二手/.test(s))profile.age='二手';
    if(/车位|车库|停车|garage|parking/i.test(s))profile.parking=/(2|两|双)\s*个?\s*车?(位|库)/.test(s)?'2车位+':'1车位';
    if(/宠物|养狗|养猫|有狗|有猫|pet/i.test(s))profile.pet='宠物友好';
    var fe=[];if(/后院|院子|backyard|yard/i.test(s))fe.push('后院');if(/地下室|basement/i.test(s))fe.push('地下室');if(/车库|garage/i.test(s))fe.push('车库');if(/电梯|elevator/i.test(s))fe.push('电梯');if(fe.length)profile.features=fe.join('、');
    if(/安静|清静|quiet/i.test(s))profile.vibe='安静';else if(/热闹|繁华|lively/i.test(s))profile.vibe='热闹';
    var kid=s.match(/(\d{1,2})\s*岁/);if(kid){var a=parseInt(kid[1],10);profile.kids=a<=5?'学龄前':(a<=11?'小学':(a<=18?'中学':''));if(profile.kids)profile.family='有孩子';}
    if(/孩子|小孩|娃|宝宝|kid|child/i.test(s)&&!profile.family)profile.family='有孩子';
    if(/夫妻|两口|二人世界|新婚|配偶/.test(s)&&!profile.family)profile.family='夫妻两口';
    if(/单身|一个人住|自己住/.test(s))profile.family='单身';
    if(/三代|和父母|带老人|养老/.test(s))profile.family='三代同堂';
    if(/首次|第一次买|first\s*time|刚需/i.test(s))profile.firstTime='是';
    if(/尽快|越快越好|很急|马上买/.test(s))profile.timeline='尽快';else if(/(3|三)\s*个月/.test(s))profile.timeline='3个月内';else if(/半年|(6|六)\s*个月/.test(s))profile.timeline='半年内';else if(/一年|12\s*个月/.test(s))profile.timeline='一年内';else if(/看看|不急|慢慢看/.test(s))profile.timeline='再看看';
    if(/预批|pre-?approv|批了贷款/i.test(s))profile.preApproved='已预批';
    if(/开车|自驾|drive/i.test(s))profile.mode='开车';else if(/公交|坐车|公共交通|transit/i.test(s))profile.mode='公交';else if(/走路|步行|walk/i.test(s))profile.mode='步行';
    if(/(downtown|市中心)/i.test(s)&&!profile.dest)profile.dest='Downtown';if(/ubc/i.test(s)&&!profile.dest)profile.dest='UBC';
    if(/中文|华人|国语|粤语|中超|中餐|双语/.test(s))profile.lifeSvc='中文生活服务';
    if(/治安|安全|safe/i.test(s))profile.safety='看重安全';
    var am=[];if(/超市|grocery|买菜/i.test(s))am.push('超市');if(/餐饮|餐厅|美食|吃饭/.test(s))am.push('餐饮');if(/公园|park/i.test(s))am.push('公园');if(/健身|gym/i.test(s))am.push('健身');if(/医院|诊所|医疗/.test(s))am.push('医疗');if(am.length)profile.amenities=am.join('、');
    if(/现金流|cash\s*flow/i.test(s))profile.invGoal='现金流';else if(/增值|升值|appreciation/i.test(s))profile.invGoal='增值';
    if(/好出租|易出租|出租快|租得快|租金高/.test(s))profile.rentability='易出租优先';
    var yr=s.match(/持有\s*(\d{1,2})\s*年/);if(yr)profile.hold=yr[1]+' 年';
    pref();}
  function doSend(){var t=inp.value.trim();if(!t)return;inp.value='';extract(t);if(answer!==null){addUser(t);clearLive();var f=answer;answer=null;f(t,true);}else{addUser(t);typing(function(){addAI('已记到你的档案里。可以继续补充，或点顶部「我的档案」查看；也可以点选项继续。');});}}
  sendBtn.onclick=doSend;inp.addEventListener('keydown',function(e){if(e.key==='Enter')doSend();});
  root.querySelector('#profStrip').onclick=openProfile;

  function wireInit(){answer=purposeResolver;var c=list.querySelectorAll('.qr.live .q');for(var i=0;i<c.length;i++){(function(b){b.onclick=function(){pick(b.getAttribute('data-v'));};})(c[i]);}}
  root.querySelector('.rst').onclick=function(){list.innerHTML=initHTML;list=root.querySelector('.chat');for(var k in profile)profile[k]='';lastResult=null;profileEdit=false;pref();showChat();wireInit();};
  wireInit();
})();
</script>
