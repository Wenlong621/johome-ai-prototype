<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Johome AI Buying Agent · 交互原型</title>
<meta name="description" content="Johome Community Buying AI 选区助手手机端可交互原型"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f3ee;
  --color-background-tertiary:#faf9f5;
  --color-text-primary:#1d1d1a;
  --color-text-secondary:#6b6a63;
  --color-text-tertiary:#9b998f;
  --color-border-tertiary:rgba(0,0,0,0.10);
  --color-border-secondary:rgba(0,0,0,0.18);
  --color-background-info:#e6f1fb;--color-text-info:#0c447c;
  --color-background-warning:#faeeda;--color-text-warning:#854f0b;
  --color-background-success:#e1f5ee;--color-text-success:#0f6e56;
  --border-radius-md:8px;--border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#eceae3;font-family:var(--font-sans);color:var(--color-text-primary);padding:22px 12px 40px;-webkit-font-smoothing:antialiased}
.page-title{max-width:330px;margin:0 auto 14px;text-align:center}
.page-title h1{font-size:18px;font-weight:500;margin:0 0 4px}
.page-title p{font-size:12.5px;color:var(--color-text-secondary);margin:0;line-height:1.5}
#jhp{max-width:330px;margin:0 auto}
.jhp-cap{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--color-text-secondary);margin:0 0 12px 2px;line-height:1.45}
.jhp-cap i{color:#0F6E56;font-size:16px;margin-top:2px}
.ph{width:300px;margin:0 auto;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:30px;padding:7px;box-shadow:0 8px 30px rgba(0,0,0,0.10)}
.scr{height:632px;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;background:var(--color-background-tertiary)}
.sb{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 4px;font-size:11px;color:var(--color-text-primary);background:var(--color-background-primary);flex:none}
.sb .ri{display:flex;gap:5px;font-size:13px}
.stage{flex:1;min-height:0;position:relative}
.view-chat{display:flex;flex-direction:column;height:100%}
.view-detail{display:none;flex-direction:column;height:100%}
.hd{display:flex;align-items:center;gap:9px;padding:7px 12px 9px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex:none}
.bk{font-size:20px;color:var(--color-text-secondary);cursor:pointer}
.hav{width:30px;height:30px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;flex:none}
.hav i{font-size:16px;color:#fff}
.pref{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#E1F5EE;border-bottom:0.5px solid #9FE1CB;flex:none;cursor:pointer}
.pc{font-size:11.5px;color:#0F6E56;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.editbtn{display:flex;align-items:center;gap:2px;font-size:11.5px;color:#0F6E56;white-space:nowrap}
.chat,.dscroll{flex:1;min-height:0;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:11px}
.dscroll{gap:11px;background:var(--color-background-tertiary)}
.row{display:flex;gap:7px;align-items:flex-start}
.row.me{justify-content:flex-end}
.av{width:26px;height:26px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;flex:none}
.av i{font-size:14px;color:#fff}
.bub{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;border-top-left-radius:4px;padding:9px 11px;font-size:12.5px;line-height:1.55;max-width:215px}
.ubub{background:#0F6E56;color:#fff;border-radius:14px;border-top-right-radius:4px;padding:9px 11px;font-size:12.5px;line-height:1.55;max-width:210px}
.qr{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;padding-left:33px}
.q{padding:6px 11px;border-radius:999px;font-size:12px;border:0.5px solid #1D9E75;color:#0F6E56;background:transparent;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.q:hover{background:#E1F5EE}
.q.on{background:#0F6E56;color:#fff;border-color:#0F6E56}
.inbar{display:flex;align-items:center;gap:8px;padding:9px 11px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);flex:none}
.inp{flex:1;height:36px;border-radius:999px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);padding:0 14px;font-size:12.5px;color:var(--color-text-primary);outline:none}
.send{width:34px;height:34px;border-radius:50%;background:#0F6E56;border:none;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;padding:0}
.send i{color:#fff;font-size:18px}
.cc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px}
.cc[data-tap],.cc[data-more]{cursor:pointer}
.cc[data-tap]:hover,.cc[data-more]:hover{border-color:#1D9E75}
.score{width:34px;height:34px;border-radius:50%;background:#E1F5EE;border:1.5px solid #1D9E75;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none}
.score b{font-size:14px;font-weight:500;color:#0F6E56;line-height:1}
.score s{font-size:8px;color:#0F6E56;text-decoration:none}
.met{background:var(--color-background-secondary);border-radius:6px;padding:6px 8px}
.met .v{font-size:13px;font-weight:500}
.met .l{font-size:10.5px;color:var(--color-text-secondary)}
.met.mtab.on,.met.stab.on{outline:1.5px solid #1D9E75;background:#E1F5EE}
.hero{position:relative;height:172px;border-radius:12px;overflow:hidden;flex:none;background:var(--color-background-secondary)}
.heroSlides{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none}
.heroSlides::-webkit-scrollbar{display:none}
.heroSlide{flex:0 0 100%;height:100%;scroll-snap-align:start}
.heroSlide img{width:100%;height:100%;object-fit:cover;display:block}
.cmap{width:100%;height:100%}
.heroDots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:600}
.heroDots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.55);cursor:pointer;box-shadow:0 0 2px rgba(0,0,0,0.35)}
.heroDots span.on{background:#fff}
.heroHint{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);color:#fff;font-size:10.5px;padding:3px 8px;border-radius:999px;z-index:600;display:flex;align-items:center;gap:3px}
.heroTag{position:absolute;bottom:8px;left:8px;background:#0F6E56;color:#fff;font-size:10.5px;font-weight:500;padding:4px 10px;border-radius:999px;z-index:600}
.leaflet-container{font-family:var(--font-sans);background:#e8e6df}
.drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:0.5px solid var(--color-border-tertiary)}
.drow .dl{font-size:12px;color:var(--color-text-secondary)}
.drow .dv{font-size:13px;font-weight:500}
.dgrp{font-size:11px;color:var(--color-text-tertiary);font-weight:500;margin:9px 2px 1px}
.poiMapWrap{height:200px;border-radius:12px;overflow:hidden;margin-top:8px;border:0.5px solid var(--color-border-tertiary)}
.ptabrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ptabrow::-webkit-scrollbar{display:none}
.ptab{flex:none;padding:5px 11px;border-radius:999px;font-size:12px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap}
.ptab.on{background:#0F6E56;color:#fff;border-color:#0F6E56}
.stnwrap{display:flex;flex-wrap:wrap;gap:6px}
.stn{display:inline-flex;align-items:center;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:999px;padding:4px 9px}
.thumb{width:54px;height:48px;border-radius:8px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;flex:none;color:var(--color-text-tertiary)}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10.5px}
.muted{color:var(--color-text-secondary)}
.sec{font-size:12.5px;font-weight:500;margin:0 0 7px}
.field{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:10px;font-size:12.5px;color:var(--color-text-primary)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:500;background:#0F6E56;color:#fff;border:none;cursor:pointer}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--color-text-tertiary);margin:0 1px;animation:jblink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes jblink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.rst{display:block;margin:14px auto 0;font-size:12px;color:var(--color-text-secondary);background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:999px;padding:6px 14px;cursor:pointer}
</style>
</head>
<body>
<div class="page-title"><h1>⛳ Johome AI Buying Agent · 交互原型</h1><p>手机端 AI agent 选区助手 · 点选项或直接打字即可体验</p></div>
<div id="jhp">
<div class="jhp-cap"><i class="ti ti-hand-finger"></i><span>点选项或直接打字（说得越细，AI 自动记录的偏好越多，比如「130万、Downtown上班、4岁孩子、想要安静近天车的3房townhouse」）。顶部「我的档案」查看记录到的偏好。</span></div>
<div class="ph"><div class="scr">
  <div class="sb"><span>9:41</span><span class="ri"><i class="ti ti-signal-4g"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>
  <div class="stage">
    <div class="view-chat">
      <div class="hd"><i class="ti ti-arrow-left bk"></i><div class="hav"><i class="ti ti-sparkles"></i></div><div style="flex:1"><div style="font-size:13.5px;font-weight:500">Johome AI Buying Agent</div><div style="font-size:10.5px;color:#1D9E75">您的智能找房/选区/地产投资AI助手</div></div><i class="ti ti-dots muted" style="font-size:20px"></i></div>
      <div class="pref" id="profStrip"><i class="ti ti-adjustments" style="color:#0F6E56;font-size:15px"></i><span class="pc">AI 会边聊边记录你的偏好</span><span class="editbtn">我的档案<i class="ti ti-chevron-right" style="font-size:14px"></i></span></div>
      <div class="chat">
        <div class="row"><div class="av"><i class="ti ti-sparkles"></i></div><div class="bub">你好，我是 Johome AI Buying Agent。直接说说你的情况，或先选一项 —— 你买这套房主要是？</div></div>
        <div class="qr live"><button class="q" data-v="自住">自住</button><button class="q" data-v="投资">投资</button><button class="q" data-v="度假">度假</button><button class="q" data-v="自住+投资都考虑">自住+投资都考虑</button></div>
      </div>
      <div class="inbar"><input class="inp" placeholder="用自然语言告诉我你的需求…"/><i class="ti ti-microphone muted" style="font-size:19px"></i><button class="send"><i class="ti ti-arrow-up"></i></button></div>
    </div>
    <div class="view-detail"></div>
  </div>
</div></div>
<button class="rst"><i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px"></i> 重新开始演示</button>
</div>
<script>
(function(){
  var root=document.getElementById('jhp');
  var list=root.querySelector('.chat');
  var pc=root.querySelector('.pc');
  var chatView=root.querySelector('.view-chat');
  var detail=root.querySelector('.view-detail');
  var inp=root.querySelector('.inp');
  var sendBtn=root.querySelector('.send');
  var initHTML=list.innerHTML;
  var profile={purpose:'',anchor:'',area:'',district:'',dest:'',mode:'',time:'',budget:'',htype:'',beds:'',baths:'',sqftMin:'',age:'',parking:'',nearTransit:'',features:'',pet:'',family:'',kids:'',firstTime:'',vibe:'',view:'',amenities:'',safety:'',lifeSvc:'',invGoal:'',riskStyle:'',cityFocus:'',priority:'',tone:'',recDim:'',vacaScene:'',vacaFreq:'',vacaRent:'',yield:'',rentability:'',hold:'',timeline:'',preApproved:'',downPay:'',school:''};
  var answer=null,lastResult=null,stack=[],profileEdit=false;
  var BUD=[{label:'80–120万'},{label:'120–160万'},{label:'>160万'}];
  var TYP=[{label:'Townhouse'},{label:'Condo'},{label:'独立屋'},{label:'楼花'}];
  var TIM=[{label:'30分钟'},{label:'45分钟'},{label:'60分钟'}];
  var INV=[{label:'现金流'},{label:'增值'},{label:'都要'}];
  var MODE=[{label:'开车'},{label:'公交'},{label:'步行'}];
  var BEDS=[{label:'1室'},{label:'2室'},{label:'3室'},{label:'4室+'}];
  var BATHS=[{label:'1浴'},{label:'2浴'},{label:'3浴+'}];
  var AGE=[{label:'全新'},{label:'楼花'},{label:'二手'},{label:'不限'}];
  var PARK=[{label:'1车位'},{label:'2车位+'}];
  var KIDS=[{label:'学龄前'},{label:'小学'},{label:'中学'},{label:'暂无'}];
  var VIBE=[{label:'热闹'},{label:'安静'}];
  var TLINE=[{label:'尽快'},{label:'3个月内'},{label:'半年内'},{label:'一年内'},{label:'再看看'}];
  var PREAP=[{label:'已预批'},{label:'未预批'}];
  var YN=[{label:'是'},{label:'否'}];
  var FIELDS=[
    {k:'purpose',label:'购房目的',group:'基本'},
    {k:'anchor',label:'找房方式',group:'基本'},
    {k:'area',label:'目标城市/区域',group:'基本'},
    {k:'cityFocus',label:'选区侧重',group:'基本'},
    {k:'priority',label:'最看重',group:'基本'},
    {k:'recDim',label:'推荐维度',group:'基本'},
    {k:'district',label:'目标商圈',group:'基本'},
    {k:'school',label:'目标学校',group:'基本'},
    {k:'dest',label:'通勤目的地',group:'基本'},
    {k:'mode',label:'通勤方式',group:'基本',edit:MODE},
    {k:'time',label:'可接受通勤',group:'基本',edit:TIM},
    {k:'budget',label:'预算',group:'基本',edit:BUD},
    {k:'htype',label:'房型',group:'基本',edit:TYP},
    {k:'beds',label:'卧室数',group:'房源条件',edit:BEDS},
    {k:'baths',label:'浴室数',group:'房源条件',edit:BATHS},
    {k:'sqftMin',label:'最小面积',group:'房源条件'},
    {k:'age',label:'房龄偏好',group:'房源条件',edit:AGE},
    {k:'parking',label:'车位',group:'房源条件',edit:PARK},
    {k:'nearTransit',label:'近轨道交通',group:'房源条件'},
    {k:'features',label:'必备配置',group:'房源条件'},
    {k:'pet',label:'宠物友好',group:'房源条件'},
    {k:'family',label:'家庭结构',group:'家庭与学校'},
    {k:'kids',label:'孩子学段',group:'家庭与学校',edit:KIDS},
    {k:'firstTime',label:'首次购房',group:'家庭与学校',edit:YN},
    {k:'tone',label:'社区调性',group:'生活偏好'},
    {k:'vibe',label:'氛围偏好',group:'生活偏好',edit:VIBE},
    {k:'vacaScene',label:'度假场景',group:'生活偏好'},
    {k:'vacaFreq',label:'度假频率',group:'生活偏好'},
    {k:'vacaRent',label:'闲置期安排',group:'生活偏好'},
    {k:'view',label:'景观偏好',group:'生活偏好'},
    {k:'amenities',label:'周边设施',group:'生活偏好'},
    {k:'safety',label:'看重安全',group:'生活偏好'},
    {k:'lifeSvc',label:'生活服务',group:'生活偏好'},
    {k:'invGoal',label:'投资目标',group:'投资',edit:INV},
    {k:'riskStyle',label:'投资风险偏好',group:'投资'},
    {k:'hold',label:'持有周期',group:'投资'},
    {k:'yield',label:'目标回报',group:'投资'},
    {k:'rentability',label:'出租优先',group:'投资'},
    {k:'timeline',label:'购房时间线',group:'时间线与资金',edit:TLINE},
    {k:'preApproved',label:'贷款预批',group:'时间线与资金',edit:PREAP},
    {k:'downPay',label:'首付比例',group:'时间线与资金'}
  ];

  function esc(s){return (''+s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function scroll(){list.scrollTop=list.scrollHeight;}
  function addAI(html){var r=document.createElement('div');r.className='row';r.innerHTML='<div class="av"><i class="ti ti-sparkles"></i></div><div class="bub">'+html+'</div>';list.appendChild(r);scroll();}
  function addUser(t){var r=document.createElement('div');r.className='row me';r.innerHTML='<div class="ubub">'+esc(t)+'</div>';list.appendChild(r);scroll();}
  function clearLive(){var n=list.querySelectorAll('.qr.live');for(var i=0;i<n.length;i++)n[i].remove();}
  function quick(opts){var w=document.createElement('div');w.className='qr live';opts.forEach(function(o){var b=document.createElement('button');b.className='q';b.innerHTML=(o.icon?'<i class="ti '+o.icon+'"></i>':'')+o.label;b.onclick=function(){pick(o.label);};w.appendChild(b);});list.appendChild(w);scroll();}
  function quickAct(opts,cls){var w=document.createElement('div');w.className='qr'+(cls?' '+cls:'');opts.forEach(function(o){var b=document.createElement('button');b.className='q';b.innerHTML=(o.icon?'<i class="ti '+o.icon+'"></i>':'')+o.label;b.onclick=o.fn;w.appendChild(b);});list.appendChild(w);scroll();}
  function pick(v){if(answer===null)return;addUser(v);clearLive();var f=answer;answer=null;f(v,false);}
  function typing(cb){var r=document.createElement('div');r.className='row';r.innerHTML='<div class="av"><i class="ti ti-sparkles"></i></div><div class="bub"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';list.appendChild(r);scroll();setTimeout(function(){r.remove();cb();},600);}
  function disablePickables(){var n=list.querySelectorAll('.qr.pickable button'),i;for(i=0;i<n.length;i++){n[i].disabled=true;n[i].style.opacity='0.45';n[i].style.pointerEvents='none';}}
  function ask(html,opts,resolver){disablePickables();typing(function(){addAI(html);if(opts)quick(opts);answer=resolver;});}
  function askInput(html,examples,resolver){disablePickables();typing(function(){addAI(html);if(examples)quick(examples);answer=resolver;inp.focus();});}
  function addBlock(html,tapFn){var r=document.createElement('div');r.className='row';r.innerHTML='<div class="av"><i class="ti ti-sparkles"></i></div>';var d=document.createElement('div');d.style.flex='1';d.style.minWidth='0';d.innerHTML=html;r.appendChild(d);list.appendChild(r);if(tapFn){var n=d.querySelectorAll('[data-tap]');for(var i=0;i<n.length;i++){(function(el){el.addEventListener('click',function(){tapFn(el.getAttribute('data-tap'),el.getAttribute('data-city')||'');});})(n[i]);}}scroll();}
  function pref(){var cnt=0;for(var i=0;i<FIELDS.length;i++){if(profile[FIELDS[i].k])cnt++;}pc.textContent=cnt?('已记录 '+cnt+' 项偏好'):'AI 会边聊边记录你的偏好';}
  function askBudget(next){ask('预算大概多少？',BUD,function(v){profile.budget=v;pref();next();});}
  function askType(next){ask('想要什么房型？',TYP,function(v){profile.htype=v;pref();next();});}

  function distThemeArr(theme){var map={'海景':[['Ambleside','Marine Dr','海景·步行商街'],['Steveston','渔人码头','渔村·海鲜·海景'],['Lower Lonsdale','Shipyards','码头市集·海景']],'繁华':[['Downtown / Robson','Robson St','繁华核心·购物'],['Yaletown','Mainland St','时尚·夜生活'],['Metrotown','Metropolis','大商场·天车']]};return map[theme]||[['Metrotown','Metropolis 商场','成熟商圈·天车'],['Brentwood','The Amazing Brentwood','年轻潮流·新盘'],['Lougheed','Lougheed Town Centre','天车交汇·性价比']];}
  function distCardsTheme(theme){var arr=distThemeArr(theme),h='<div style="display:flex;gap:9px;overflow-x:auto;padding-bottom:3px">',i;for(i=0;i<arr.length;i++){var dm=distMetrics(arr[i][0],distCity(arr[i][0]));h+=districtcard(arr[i][0],arr[i][1],arr[i][2],'$'+dm.condo+'万','范围内 Condo 中位',dm.cnt+' 套','范围内房源');}return h+'</div>';}
  function cityThemeArr(theme){var map={'海景':[['West Vancouver','北岸·海景高端','$305万','中位价','+7.5%','近一年'],['Richmond','海岛·渔村风情','$132万','中位价','+3.4%','近一年'],['North Vancouver','山海自然','$155万','中位价','+4.2%','近一年']],'性价比':[['Surrey','高增长·友好','$95万','中位价','+6.3%','近一年'],['Coquitlam','天车·性价比','$110万','中位价','+5.5%','近一年'],['Langley','新区·便宜','$88万','中位价','+5.0%','近一年']]};return map[theme]||[['Burnaby','大温核心','$118万','中位价','+5.1%','近一年'],['Richmond','亚洲美食','$132万','中位价','+3.4%','近一年'],['Vancouver West','名校·便利','$135万','中位价','+3.5%','近一年']];}
  function cityCardsTheme(theme){return citycardsHTML(cityThemeArr(theme));}
  function cntProfile(){var c=0,i;for(i=0;i<FIELDS.length;i++)if(profile[FIELDS[i].k])c++;return c;}
  function isRec(t){return /推荐|有没有|帮我(找|推荐|看|挑)|给我(推荐|几个|几套|来|挑)|更适合|想找|找个|找一个|找几个|介绍|哪些|哪个|有什么/.test(t)&&/社区|小区|房源|房子|套房|商圈|学校|名校|学区|城市|区域|地方|地段|盘/.test(t);}
  function freeRecommend(t,pending){var type=/片区|生活区|生活圈/.test(t)?'zone':/几套|套房|房源|房子|listing/.test(t)?'listing':/商圈/.test(t)?'district':((/学校|名校/.test(t)||(/学区/.test(t)&&!/社区|小区/.test(t)))?'school':(/城市|哪个市|哪个城/.test(t)?'city':'nb'));var theme=/海景|海边|江景|河景|水景|sea|ocean|water/i.test(t)?'海景':/学区|名校/.test(t)?'学区':/通勤|上班|天车|地铁|近站|近车/.test(t)?'通勤':/安静|清静|自然|公园|远离喧嚣/.test(t)?'自然':/性价比|便宜|实惠|预算紧|划算/.test(t)?'性价比':/热闹|繁华|夜生活|市中心/.test(t)?'繁华':'';lastResult=function(){freeRecommend(t);};var tn={listing:'房源',district:'商圈',school:'学校',city:'城市',nb:'社区',zone:'片区'}[type],cond=[];if(theme)cond.push(theme);if(profile.budget)cond.push('预算 '+profile.budget);if(profile.htype)cond.push(profile.htype);typing(function(){addAI('根据你说的'+(cond.length?('（'+cond.join(' · ')+'）'):'')+'，给你挑了 3 个'+tn+'，按匹配度排序，点开看详情：');addReason();var names=[],openFn=null;if(type==='zone'){var za={'海景':['西温 Ambleside','白石南素里','Kits 海滨'],'学区':['温西西区名校区','Cambie 走廊','三联市中心'],'通勤':['Metrotown 片区','Lougheed 片区','Downtown 半岛'],'自然':['北温 Lonsdale','港穆迪 Inlet','Steveston'],'性价比':['素里中心','Willoughby-Clayton 新区','新西敏河畔'],'繁华':['Downtown 半岛','Metrotown 片区','列治文中心']}[theme]||['Metrotown 片区','北温 Lonsdale','白石南素里'];addBlock(zoneScroll(za),openZonePage);names=za.slice();openFn=chooseZone;}else if(type==='nb'){var arr=(NBTHEME[theme]||NBTHEME._def).slice(0,3);addBlock(nbScroll(arr),openCommunity);names=arr.map(function(a){return a[0];});openFn=chooseCommunity;}else if(type==='listing'){listingsBlock(false);}else if(type==='district'){var da=distThemeArr(theme);addBlock(distCardsTheme(theme),openDistrictPage);names=da.map(function(a){return a[0];});openFn=openDistrictPage;}else if(type==='school'){var sa=[['West Bay Elementary','公立 · 小学','9.0','近海 · 顶级学区'],['Sentinel Secondary','公立 · 中学','8.8','AP · 名校'],['University Hill Sec','公立 · 中学','8.7','UBC 旁 · 高分']];addBlock('<div style="display:flex;gap:9px;overflow-x:auto;padding-bottom:3px">'+schoolcard(sa[0][0],sa[0][1],sa[0][2],sa[0][3])+schoolcard(sa[1][0],sa[1][1],sa[1][2],sa[1][3])+schoolcard(sa[2][0],sa[2][1],sa[2][2],sa[2][3])+'</div>',openSchoolPage);names=sa.map(function(a){return a[0];});openFn=openSchoolPage;}else{var ca=cityThemeArr(theme);addBlock(citycardsHTML(ca),openCityPage);names=ca.map(function(a){return a[0];});openFn=chooseCity;}var m=(profile.budget||'').match(/约 (\d{1,3}) 万/);if(theme==='海景'&&m&&parseInt(m[1],10)<90)addAI('提示：海景社区整体偏贵，'+profile.budget+'在这些区主要能买到公寓/小户型——点进社区看「社区内在售房源」会按你的预算排。');if(openFn&&names.length>1)askWhich(tn,names,openFn);if(pending)addAI('（上面的问题还在，点它的选项可继续问诊。）');});}
  function doSend(){var t=inp.value.trim();if(!t)return;inp.value='';extract(t);var mm=parseMulti(t);if(mm){addUser(t);disablePickables();answer=null;groupedRec(mm.noun,mm.items);return;}if(answer!==null&&isRec(t)){addUser(t);freeRecommend(t,true);return;}if(answer!==null){addUser(t);clearLive();var f=answer;answer=null;f(t,true);return;}addUser(t);if(isRec(t)){freeRecommend(t);}else{typing(function(){var n=cntProfile();addAI('已记到你的档案'+(n?('（共 '+n+' 项）'):'')+'。想让我直接给建议，可以说「推荐几个海景社区」「给我几套预算内的房源」；也可以点选项继续。');});}}
  sendBtn.onclick=doSend;inp.addEventListener('keydown',function(e){if(e.key==='Enter')doSend();});
