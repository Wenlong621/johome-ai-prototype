<title>房源资料 Section · Ready 评审稿（同步 v5）</title>
<style>
:root{
  --brand:#2E6BE6; --brand-ink:#1E4FB8; --brand-soft:#EDF3FE;
  --ink:#182338; --ink-2:#54627C; --muted:#8C99AF; --line:#E7ECF3;
  --page:#E4E8EF; --card:#FFFFFF;
  --ok:#0E9F6E; --ok-soft:#E7F6F0; --warn:#C97A06; --warn-soft:#FCF3E4;
  --fix:#D8402F; --fix-soft:#FDEEEC;
  --chrome-ink:#3A465C; --chrome-mut:#8C99AF;
}
@media (prefers-color-scheme: dark){ :root{ --page:#151922; --chrome-ink:#D8DFEB; --chrome-mut:#7C8AA3; } }
:root[data-theme="dark"]{ --page:#151922; --chrome-ink:#D8DFEB; --chrome-mut:#7C8AA3; }
:root[data-theme="light"]{ --page:#E4E8EF; --chrome-ink:#3A465C; --chrome-mut:#8C99AF; }

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--page);font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;color:var(--chrome-ink);padding:20px 12px 48px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* ---------- 工具条 ---------- */
.toolbar{width:100%;max-width:430px;display:flex;flex-direction:column;gap:10px}
.toolbar h1{font-size:15px;font-weight:700}
.toolbar h1 small{display:block;font-size:11px;font-weight:400;color:var(--chrome-mut);margin-top:2px}
.tb-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.seg{display:flex;background:rgba(46,107,230,.10);border-radius:999px;padding:3px;flex-wrap:wrap}
.seg button{border:0;background:transparent;font:inherit;font-size:12px;padding:6px 12px;border-radius:999px;color:var(--chrome-ink);cursor:pointer}
.seg button.on{background:var(--brand);color:#fff;font-weight:600}
.seg button:focus-visible,.anno-toggle:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
.anno-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--brand);color:var(--brand);background:transparent;font:inherit;font-size:12px;padding:5px 12px;border-radius:999px;cursor:pointer;margin-left:auto}
.anno-toggle.on{background:var(--brand);border-color:var(--brand);color:#fff}
.legend{display:none;gap:10px;flex-wrap:wrap;font-size:10.5px;color:var(--chrome-mut);align-items:center}
body.anno .legend{display:flex}
.legend i{display:inline-flex;align-items:center;gap:4px;font-style:normal}
.legend .dot{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ---------- 手机卡 ---------- */
.phone{width:100%;max-width:430px;background:#F3F5F9;border-radius:18px;box-shadow:0 0 50px -10px rgba(24,35,56,.18);overflow:hidden}
.appbar{background:rgba(255,255,255,.95);padding:12px 16px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;color:var(--ink)}
.appbar b{font-size:14px;font-weight:600;flex:1;text-align:center}
.pricebar{padding:14px 16px 6px;color:var(--ink)}
.pricebar .p{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink)}
.pricebar .addr{font-size:12.5px;color:var(--ink-2);margin-top:3px}
.samplebadge{display:inline-block;font-size:10px;color:#fff;background:var(--muted);border-radius:4px;padding:2px 6px;margin-left:6px;vertical-align:3px}

/* 房源资料卡（对齐 v5 O2+ Tab 化） */
.card{background:var(--card);border-radius:14px;margin:10px 12px 16px;box-shadow:0 1px 2px rgba(24,35,56,.04),0 6px 20px -8px rgba(24,35,56,.08);overflow:hidden;color:var(--ink)}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;padding:13px 14px 0}
.sec-title{font-size:14.5px;font-weight:700}
.sec-src{font-size:10px;color:var(--muted)}
.dtabs{display:flex;gap:4px;margin:10px 14px 0;background:#F2F5F9;border-radius:11px;padding:3px}
.dtab{flex:1;text-align:center;font-size:12.5px;color:var(--ink-2);padding:8px 0;border-radius:9px;cursor:pointer;font-weight:500;transition:.15s;border:0;background:transparent;font-family:inherit}
.dtab.on{background:#fff;color:var(--ink);font-weight:700;box-shadow:0 1px 4px rgba(24,35,56,.1)}
.dtab:focus-visible{outline:2px solid var(--brand)}
.ins-chip{display:flex;gap:7px;align-items:flex-start;margin:10px 14px 0;background:var(--brand-soft);border:1px solid #DCE8FC;border-radius:10px;padding:8px 11px;font-size:11.5px;color:var(--brand-ink);line-height:1.55}
.ins-chip.gold{background:#FCF6E8;border-color:#F0E2C0;color:#8A5A18}
.ins-chip.green{background:var(--ok-soft);border-color:#CBEBDD;color:#0B7A54}
.kv{padding:8px 14px 6px}
.kv .row{display:flex;justify-content:space-between;gap:12px;padding:7.5px 0;border-bottom:1px solid #F1F4F8;font-size:12px}
.kv .row:last-child{border-bottom:0}
.kv .row .k{color:var(--muted);flex:none}
.kv .row .v{font-weight:600;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;line-height:1.5}
.kv .subh{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--brand);padding:13px 0 4px}
.kv .subh:first-child{padding-top:2px}
.fold-blk{margin:6px 14px 10px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
.fold-blk summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:9px 11px;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--brand);background:#F7F9FC}
.fold-blk summary::-webkit-details-marker{display:none}
.fold-blk summary em{font-style:normal;font-weight:400;color:var(--muted);font-size:10px;margin-left:auto}
.fold-blk summary::after{content:'▾';color:var(--brand);font-size:10px;transition:transform .15s}
.fold-blk[open] summary::after{transform:rotate(180deg)}
.fold-blk .rooms{padding:4px 11px 10px;margin:0}
.ubtn{border:1px solid var(--brand);color:var(--brand);background:transparent;border-radius:999px;font-size:9.5px;padding:1px 7px;margin-left:6px;cursor:pointer;font-family:inherit;vertical-align:1px}
.ubtn:hover{background:var(--brand-soft)}
.badge{font-size:9.5px;border-radius:3px;padding:1px 5px;color:#fff;vertical-align:1px;margin-left:6px;display:none;white-space:nowrap;font-weight:600}
body.anno .badge{display:inline-block}
.badge.new{background:var(--ok)} .badge.fix{background:var(--fix)}
.kv .row.ghost{display:none;background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(140,153,175,.07) 6px,rgba(140,153,175,.07) 12px)}
body.anno .kv .row.ghost{display:flex}
.kv .row.ghost .k,.kv .row.ghost .v{color:var(--muted);text-decoration:line-through;font-weight:400}
.kv .row.ghost .v .why{display:block;font-size:10px;color:var(--fix);text-decoration:none;margin-top:1px;text-align:right}
.rooms{padding:0 14px 12px}
.rooms table{width:100%;border-collapse:collapse;font-size:11.5px}
.rooms th{text-align:left;color:var(--muted);font-weight:500;padding:6px 0;border-bottom:1px solid var(--line);font-size:10.5px}
.rooms td{padding:6.5px 0;border-bottom:1px solid #F1F4F8;color:var(--ink-2)}
.rooms td:first-child{color:var(--ink);font-weight:500}
.rooms td:last-child,.rooms th:last-child{text-align:right;font-variant-numeric:tabular-nums}
.legal-fold{margin:4px 14px 12px}
.legal-fold summary{list-style:none;cursor:pointer;font-size:11.5px;color:var(--brand);font-weight:500}
.legal-fold summary::-webkit-details-marker{display:none}
.legal-fold p{margin-top:6px;font-size:10.5px;color:var(--muted);line-height:1.6}
.footnote{padding:2px 14px 12px;font-size:10.5px;color:var(--muted);line-height:1.65}
</style>

function uSwap(b){var v=b.previousElementSibling;var isA=v.textContent===v.dataset.a;v.textContent=isA?v.dataset.b:v.dataset.a;b.textContent='\u21c4 '+(isA?b.dataset.u1:b.dataset.u2);}
let dtType='house', dtIdx=0;
const $seg=document.getElementById('typeSeg');
Object.keys(META).forEach(k=>{
  const b=document.createElement('button');
  b.textContent=META[k].seg; b.setAttribute('role','tab');
  b.onclick=()=>{dtType=k;dtIdx=Math.min(dtIdx,DETAILS[k].tabs.length-1);renderAll()};
  b.dataset.k=k; $seg.appendChild(b);
});
function badge(m){return m&&m.b?`<span class="badge ${m.b}">${m.b==='new'?'新增':'修复'}</span>`:'';}
function renderAll(){
  document.querySelectorAll('#typeSeg button').forEach(b=>{b.classList.toggle('on',b.dataset.k===dtType);b.setAttribute('aria-selected',b.dataset.k===dtType);});
  const meta=META[dtType];
  document.getElementById('appTitle').textContent=meta.title;
  document.getElementById('pricebar').innerHTML=`<div class="p">${meta.price}${meta.sample?'<span class="samplebadge">示意样例</span>':''}</div><div class="addr">${meta.addr}</div>`;
  const d=DETAILS[dtType];
  document.getElementById('dtSrc').textContent=d.src;
  document.getElementById('dtabs').innerHTML=d.tabs.map((tb,i)=>
    `<button class="dtab${i===dtIdx?' on':''}" data-i="${i}">${tb.t}</button>`).join('');
  document.querySelectorAll('.dtab').forEach(b=>b.onclick=()=>{dtIdx=+b.dataset.i;renderAll();});
  const tb=d.tabs[dtIdx];
  let h='';
  (tb.chips||[]).forEach(c=>{
    const cls=c[0]==='gold'?' gold':c[0]==='green'?' green':'';
    h+=`<div class="ins-chip${cls}">${c[1]}${badge(c[2])}</div>`;
  });
  h+=`<div class="kv">`+tb.kv.map(r=>{
    if(r[0]==='@') return `<div class="subh">${r[1]}</div>`;
    const m=r[2];
    if(m&&m.ghost) return `<div class="row ghost"><span class="k">${r[0]}</span><span class="v">${r[1]}<span class="why">▸ ${m.ghost}</span></span></div>`;
    return `<div class="row"><span class="k">${r[0]}</span><span class="v">${r[1]}${badge(m)}</span></div>`;
  }).join('')+`</div>`;
  if(tb.areas){
    h+=`<details class="fold-blk"><summary>面积明细<em>合计 ${tb.areas[tb.areas.length-1][1]}</em></summary><div class="rooms" style="margin-top:0"><table><tr><th>楼层</th><th>面积</th></tr>`+
      tb.areas.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')+`</table></div></details>`;
  }
  if(tb.rooms){
    h+=`<details class="fold-blk"><summary>房间与尺寸<em>${tb.rooms.length} 个房间</em></summary><div class="rooms"><table><tr><th>房间</th><th>楼层</th><th>尺寸</th></tr>`+
      tb.rooms.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')+`</table></div></details>`;
  }
  if(tb.baths){
    h+=`<details class="fold-blk"><summary>卫生间<em>${tb.baths.length} 个</em></summary><div class="rooms"><table><tr><th>楼层</th><th>规格 (#Pcs)</th></tr>`+
      tb.baths.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')+`</table></div></details>`;
  }
  if(tb.note) h+=`<div class="footnote">${tb.note}</div>`;
  if(tb.legal) h+=`<details class="legal-fold"><summary>法律描述 ▾</summary><p>${tb.legal}</p></details>`;
  document.getElementById('dtBody').innerHTML=h;
}
document.getElementById('annoBtn').onclick=e=>{
  document.body.classList.toggle('anno');
  const on=document.body.classList.contains('anno');
  e.currentTarget.classList.toggle('on',on);
  e.currentTarget.setAttribute('aria-pressed',on);
};
renderAll();
</script>
